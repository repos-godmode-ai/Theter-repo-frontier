# Deploy operator console to GitHub Pages (static).
# Repository secrets (Settings → Secrets → Actions):
#   VITE_GATEWAY_URL   — public HTTPS URL of your gateway (e.g. Railway)
#   VITE_ADMIN_TOKEN   — same value as gateway ADMIN_TOKEN
name: Deploy console to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build console
        env:
          VITE_GATEWAY_URL: ${{ secrets.VITE_GATEWAY_URL }}
          VITE_ADMIN_TOKEN: ${{ secrets.VITE_ADMIN_TOKEN }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build -w @paywall/console

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/console/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
